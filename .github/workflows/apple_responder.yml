name: Apple App Store Auto Reply

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore replied IDs cache
        uses: actions/cache@v3
        with:
          path: apple_replied_ids.txt
          key: apple-replied-ids-cache
          restore-keys: |
            apple-replied-ids-cache
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyjwt cryptography
      - run: python apple_responder.py
        env:
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
