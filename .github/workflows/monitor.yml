name: Google Play Auto Reply

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    outputs:
      new_ids: ${{ steps.run.outputs.new_ids }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-api-python-client google-auth requests
      - name: Run monitor script
        id: run
        run: python monitor.py
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: ${{ secrets.PACKAGE_NAME }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          REPLIED_IDS: ${{ secrets.REPLIED_IDS || '' }}

  update-secret:
    runs-on: ubuntu-latest
    needs: reply
    if: needs.reply.outputs.new_ids != ''
    steps:
      - name: Update REPLIED_IDS secret
        uses: actions/github-script@v7
        with:
          script: |
            const currentIds = '${{ secrets.REPLIED_IDS || '' }}';
            const newIds = '${{ needs.reply.outputs.new_ids }}';
            const allIds = currentIds ? `${currentIds},${newIds}` : newIds;
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'REPLIED_IDS',
              encrypted_value: allIds
            });
            console.log(`Updated REPLIED_IDS secret with ${newIds}`);
