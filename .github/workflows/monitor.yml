name: Google Play Auto Reply

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送代码
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - run: pip install google-api-python-client google-auth requests
      
      - name: Run monitor script
        run: python monitor.py
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: ${{ secrets.PACKAGE_NAME }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Commit and push replied IDs cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add replied_ids.txt
          git diff --staged --quiet || git commit -m "Update replied IDs cache"
          git push
