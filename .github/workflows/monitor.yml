name: Google Play Auto Reply

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore replied IDs cache
        uses: actions/cache@v3
        id: cache-restore
        with:
          path: replied_ids.txt
          key: replied-ids-cache
          restore-keys: |
            replied-ids-cache
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install google-api-python-client google-auth requests
      
      - run: python monitor.py
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: ${{ secrets.PACKAGE_NAME }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Save replied IDs cache
        uses: actions/cache@v3
        with:
          path: replied_ids.txt
          key: replied-ids-cache-${{ github.run_id }}
          restore-keys: |
            replied-ids-cache
